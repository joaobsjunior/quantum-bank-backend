server:
  port: 8080
  ssl:
    enabled: ${QUANTUM_BANK_BACKEND_SSL_ENABLED:false}
    key-store: ${QUANTUM_BANK_BACKEND_KEY_STORE:../pki/local-ca/runtime/backend-server.p12}
    key-store-password: ${QUANTUM_BANK_BACKEND_KEY_STORE_PASSWORD:changeit}
    key-store-type: PKCS12
    trust-store: ${QUANTUM_BANK_BACKEND_TRUST_STORE:../pki/local-ca/runtime/backend-truststore.p12}
    trust-store-password: ${QUANTUM_BANK_BACKEND_TRUST_STORE_PASSWORD:changeit}
    trust-store-type: PKCS12
    client-auth: NEED

quantum-bank:
  security:
    issuer-uri: ${QUANTUM_BANK_ISSUER_URI:http://localhost:8180/realms/quantum-bank-local}
    jwk-set-uri: ${QUANTUM_BANK_JWK_SET_URI:http://localhost:8180/realms/quantum-bank-local/protocol/openid-connect/certs}
    audience: quantum-bank-api
    clock-skew: 60s
    otk-ttl: 5m
    certificate-profile: quantum-bank-mobile-client-v1
    environment: local
    pki:
      sign-command: ${QUANTUM_BANK_PKI_SIGN_COMMAND:../pki/scripts/sign-csr.sh}

spring:
  datasource:
    url: ${QUANTUM_BANK_DATASOURCE_URL:jdbc:h2:mem:quantumbank;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: org.h2.Driver
    username: ${QUANTUM_BANK_DATASOURCE_USERNAME:sa}
    password: ${QUANTUM_BANK_DATASOURCE_PASSWORD:}
  h2:
    console:
      enabled: ${QUANTUM_BANK_H2_CONSOLE_ENABLED:false}
  sql:
    init:
      mode: always
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${quantum-bank.security.issuer-uri}
          jwk-set-uri: ${quantum-bank.security.jwk-set-uri}
